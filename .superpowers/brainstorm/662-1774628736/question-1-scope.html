<h2>主题重设计范围</h2>
<p class="subtitle">你希望这次重设计覆盖哪些层面？</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>只换颜色变量</h3>
      <p>保持现有组件形状、间距、圆角不变，重新设计 8 套配色方案，使配色更协调、更有质感</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>颜色 + 组件形态</h3>
      <p>同时重新设计颜色系统和组件样式（卡片圆角、阴影深度、按钮形态、搜索框风格等），让不同主题有各自的视觉个性</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>全局视觉语言重建</h3>
      <p>除颜色和组件外，还调整排版比例、留白节奏、整体布局比例，从根本上提升设计品质</p>
    </div>
  </div>
</div>
