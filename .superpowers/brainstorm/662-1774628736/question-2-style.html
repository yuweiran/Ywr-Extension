<h2>整体风格方向</h2>
<p class="subtitle">你希望新设计传达什么感觉？这决定了排版、留白、组件形态的基调</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>极简克制（Minimal）</h3>
      <p>大量留白，细线条，极少装饰，信息优先。参考 Linear、Vercel、Notion 的冷静感</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>现代有质感（Refined）</h3>
      <p>清晰的视觉层次，适度的阴影与圆角，色块有分量感，整体精致但不冷漠。参考 Arc Browser、Raycast</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>个性鲜明（Expressive）</h3>
      <p>每套主题有强烈的视觉个性，大胆用色，组件形态随主题变化，强调氛围感</p>
    </div>
  </div>
</div>
