<h2>主题数量与策略</h2>
<p class="subtitle">现在有 8 套主题，全部重做工作量很大。你希望怎么处理？</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>精选 4 套，深度打磨</h3>
      <p>从现有 8 套中保留最有价值的 4 套，每套都做到高完成度。推荐：默认灰调、暗夜紫金、赛博霓虹、樱花粉黛（各代表一种大类）</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>保留全部 8 套，统一升级</h3>
      <p>所有主题都按新设计语言重做颜色系统，组件形态全局统一升级</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>重新定义套系，重建 6 套</h3>
      <p>抛开现有命名，按明/暗模式各 3 套重新设计，确保每套在对应模式下都足够优秀</p>
    </div>
  </div>
</div>
