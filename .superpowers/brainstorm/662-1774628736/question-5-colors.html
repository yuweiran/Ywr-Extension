<h2>高饱和彩色主题方向</h2>
<p class="subtitle">2 套彩色主题，每套用 2-3 种主色拼接搭配，保证色彩和谐。先选大方向</p>

<div class="options" data-multiselect>

  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>暖调：珊瑚 × 金橙</h3>
      <div style="display:flex;gap:6px;margin:0.5rem 0">
        <div style="width:24px;height:24px;border-radius:5px;background:#ff6b6b"></div>
        <div style="width:24px;height:24px;border-radius:5px;background:#ffa94d"></div>
        <div style="width:24px;height:24px;border-radius:5px;background:#fff3e0"></div>
        <div style="width:24px;height:24px;border-radius:5px;background:#fff"></div>
      </div>
      <p>活力温暖，珊瑚红主色 + 金橙 accent，浅米底，适合喜欢暖色的用户</p>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>冷调：靛蓝 × 薄荷绿</h3>
      <div style="display:flex;gap:6px;margin:0.5rem 0">
        <div style="width:24px;height:24px;border-radius:5px;background:#4263eb"></div>
        <div style="width:24px;height:24px;border-radius:5px;background:#20c997"></div>
        <div style="width:24px;height:24px;border-radius:5px;background:#e8f4ff"></div>
        <div style="width:24px;height:24px;border-radius:5px;background:#fff"></div>
      </div>
      <p>清爽专注，靛蓝主色 + 薄荷绿 accent，浅冰底，对比鲜明但不刺眼</p>
    </div>
  </div>

  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>撞色：紫罗兰 × 柠黄</h3>
      <div style="display:flex;gap:6px;margin:0.5rem 0">
        <div style="width:24px;height:24px;border-radius:5px;background:#7c3aed"></div>
        <div style="width:24px;height:24px;border-radius:5px;background:#fbbf24"></div>
        <div style="width:24px;height:24px;border-radius:5px;background:#f5f3ff"></div>
        <div style="width:24px;height:24px;border-radius:5px;background:#fff"></div>
      </div>
      <p>大胆有个性，深紫主色 + 柠黄 accent，补色撞色，视觉冲击力强但和谐</p>
    </div>
  </div>

  <div class="option" data-choice="d" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>渐变：玫红 × 天蓝</h3>
      <div style="display:flex;gap:6px;margin:0.5rem 0">
        <div style="width:24px;height:24px;border-radius:5px;background:#e91e8c"></div>
        <div style="width:24px;height:24px;border-radius:5px;background:#00b4d8"></div>
        <div style="width:24px;height:24px;border-radius:5px;background:#fce4f3"></div>
        <div style="width:24px;height:24px;border-radius:5px;background:#fff"></div>
      </div>
      <p>年轻时尚，玫红主色 + 天蓝 accent，分裂互补色系，活跃不俗气</p>
    </div>
  </div>

</div>

<p style="text-align:center;color:#6b7280;font-size:0.85rem;margin-top:1rem">可多选（选出你想要的 2 套），也可以在终端描述你的想法</p>
