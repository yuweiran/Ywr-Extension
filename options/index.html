<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ywr Extension 设置</title>
  <link rel="stylesheet" href="../css/normalize.css" />
  <link rel="stylesheet" href="../css/variable.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="./src/css/index.css" />
</head>

<body>
  <div class="app">
    <h1 class="page-title">Ywr Extension 设置</h1>

    <!-- Profile -->
    <div class="card">
      <h2 class="card-title">个人资料</h2>
      <div class="profile-section">
        <div class="avatar-area">
          <div class="avatar-preview" id="avatarPreview"></div>
          <div class="avatar-actions">
            <button class="btn btn-primary" id="btnChooseAvatar">选择图片</button>
            <button class="btn btn-secondary" id="btnRemoveAvatar">移除</button>
            <input type="file" id="avatarInput" accept="image/*" hidden />
          </div>
        </div>
        <div class="signature-area">
          <label class="field-label" for="signatureInput">个性签名</label>
          <input type="text" id="signatureInput" class="field-input" maxlength="100" placeholder="写点什么…" />
          <span class="char-count"><span id="charCount">0</span>/100</span>
        </div>
        <button class="btn btn-primary btn-save" id="btnSaveProfile">保存 Profile</button>
        <div class="msg" id="profileMsg"></div>
      </div>
    </div>

    <!-- Data Management -->
    <div class="card">
      <h2 class="card-title">数据管理</h2>
      <div class="data-section">
        <div class="data-row">
          <button class="btn btn-primary" id="btnExport">导出数据</button>
          <span class="data-desc">导出全部集合和链接为 JSON 文件</span>
        </div>
        <div class="data-row">
          <button class="btn btn-secondary" id="btnImport">导入数据</button>
          <span class="data-desc">从 JSON 文件恢复（覆盖当前数据）</span>
          <input type="file" id="importInput" accept=".json" hidden />
        </div>
        <div class="msg" id="dataMsg"></div>
      </div>
    </div>
  </div>

  <script src="./load.js"></script>
</body>

</html>
